command:
  - streamlit
  - run
  - app.py
  - --server.port
  - "${DATABRICKS_APP_PORT:-8000}"
  - --server.address
  - "0.0.0.0"
env:
  - name: STREAMLIT_GATHER_USAGE_STATS
    value: "false"
  - name: STREAMLIT_SERVER_ENABLE_CORS
    value: "false"
  - name: STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION
    value: "false"
